<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/index.css">
  <script defer src="js/index.js"></script>
  <title>Calculator</title>
</head>
<body>
	<div class="wrapper">
    <div id="output" class="output"></div>
    <div class="inputs-wrapper">
      <div class="control-and-num-wrapper">
        <div class="control-inputs">
        <div id="clear-btn" class="controls clear-btn">C</div>
        <div class="controls">%</div>
        <div id="remove-last" class="controls"><=</div>
      </div>
      <div class="num-inputs">
        <div>
          <div class="nums">1</div>
          <div class="nums">2</div>
          <div class="nums">3</div>
        </div>
        <div>
          <div class="nums">4</div>
          <div class="nums">5</div>
          <div class="nums">6</div>
        </div>
          <div>
          <div class="nums">7</div>
          <div class="nums">8</div>
          <div class="nums">9</div>
        </div>
        <div>
          <div class="nums orientation-btn">#</div>
          <div class="nums">0</div>
          <div class="nums dot">.</div>
        </div>
      </div>

      </div>
      <div class="assignment-inputs">
        <div class="assignments">÷</div>
        <div class="assignments">×</div>
        <div class="assignments">-</div>
        <div class="assignments">+</div>
        <div class="assignments equal-sign">=</div>
      </div>
    </div>
  </div>
</body>
</html>
